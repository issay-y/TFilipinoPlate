<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Filipino Plate</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="site-body">
        <main class="site-shell">
            <header class="hero">
                <h1>The Filipino Plate</h1>
                <p>Discover Filipino recipes from Panlasang Pinoy and admin-curated community recipes.</p>
                <div class="hero-actions">
                    <a href="admin.html" class="button-link">Go to Admin Dashboard</a>
                </div>
            </header>

            <section class="panel">
                <h2>Recipe Search</h2>
                <form id="recipe-search-form" class="form-inline">
                    <input type="text" id="recipe-query" placeholder="Search recipes (e.g. adobo)">
                    <button type="submit">Search</button>
                </form>
                <p id="recipe-search-meta" class="status-message"></p>
            </section>

            <section class="panel">
                <h2>Recipes</h2>
                <div id="recipe-list" class="list"></div>
            </section>
        </main>
    </body>
    <script src="script.js"></script>
</html>
